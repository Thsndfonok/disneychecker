name: Disney+ Account Checker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install requests
    
    - name: Run Disney+ Checker
      run: python disneychecker.py
    
    - name: Upload working accounts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: working-accounts
        path: WORKING_ACCOUNTS.txt
    
    - name: Upload invalid accounts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: invalid-accounts
        path: INVALID_ACCOUNTS.txt
    
    - name: Upload 2FA accounts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: twofa-accounts
        path: TWOFA_ACCOUNTS.txt
