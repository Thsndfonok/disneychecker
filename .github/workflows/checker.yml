name: Disney+ Account Checker

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser
    
    - name: Install dependencies
      run: |
        pip install undetected-chromedriver selenium
    
    - name: Run Disney+ Checker
      run: python disneychecker.py
    
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: results
        path: |
          WORKING_ACCOUNTS.txt
          INVALID_ACCOUNTS.txt
          TWOFA_ACCOUNTS.txt
