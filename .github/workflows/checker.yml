name: Disney+ Account Checker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'  # Runs every 12 hours

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pydisney
        pip install requests
    
    - name: List files (debug)
      run: ls -la
    
    - name: Run Disney+ Checker
      run: python disneychecker.py
      env:
        PYTHONUNBUFFERED: 1
    
    - name: Upload working accounts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: working-accounts
        path: WORKING_ACCOUNTS.txt
    
    - name: Upload invalid accounts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: invalid-accounts
        path: INVALID_ACCOUNTS.txt
    
    - name: Upload 2FA accounts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: twofa-accounts
        path: TWOFA_ACCOUNTS.txt
